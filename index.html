<!DOCTYPE html>
<html>

<head>
  <title>Block Survival Levels</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: white;
      font-family: Arial;
    }

    canvas {
      display: block;
      margin: auto;
      background: white;
      border: 3px solid black;
    }
  </style>
</head>

<body>

<canvas id="game" width="800" height="600"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const WIDTH = 800;
const HEIGHT = 600;

// ======================
// GAME STATE
// ======================

let state = "menu";

// menu
// playing
// dead
// level_complete

let currentLevel = 1;

// ======================
// LEVELS
// ======================

const levels = {

  1: {
    goal: 5,
    orange: false,
    purple: false,
    ice: false
  },

  2: {
    goal: 10,
    orange: true,
    purple: false,
    ice: false
  },

  3: {
    goal: 15,
    orange: true,
    purple: true,
    ice: false
  },

  4: {
    goal: 20,
    orange: true,
    purple: true,
    ice: true
  }
};

// ======================
// PLAYER
// ======================

const player = {
  x: 350,
  y: 520,
  w: 80,
  h: 40
};

let normalDirection = 1;
let normalSpeed = 6;

let slippery = false;
let iceTimer = 0;
let swingVelocity = 6;

// ======================
// SCORE
// ======================

let score = 0;

// ======================
// BLOCKS
// ======================

const redBlock = {
  x: random(0, 740),
  y: -100,
  w: 60,
  h: 60,
  speed: 5
};

const greenBlock = {
  x: random(0, 750),
  y: -300,
  w: 50,
  h: 50,
  speed: 4
};

const orangeBlock = {
  x: 200,
  y: -200,
  w: 80,
  h: 40,
  speedX: 5,
  speedY: 4,
  direction: 1
};

const purpleBlock = {
  x: random(0, 550),
  y: -500,
  w: 250,
  h: 80,
  speed: 2
};

const iceBlock = {
  x: random(0, 740),
  y: -700,
  w: 60,
  h: 60,
  speed: 5
};

// ======================
// INPUT
// ======================

document.addEventListener("keydown", (e) => {

  // MENU
  if (state === "menu") {

    if (e.key === " ") {
      state = "playing";
      resetLevel();
    }
  }

  // PLAYING
  else if (state === "playing") {

    if (e.key === "ArrowUp" || e.key.toLowerCase() === "w") {

      if (!slippery) {
        normalDirection *= -1;
      } else {
        swingVelocity *= -1;
      }
    }
  }

  // DEAD
  else if (state === "dead") {

    if (e.key.toLowerCase() === "r") {
      resetLevel();
      state = "playing";
    }
  }

  // LEVEL COMPLETE
  else if (state === "level_complete") {

    if (e.key === " ") {

      currentLevel++;

      if (currentLevel > 4) {
        currentLevel = 1;
      }

      resetLevel();
      state = "playing";
    }
  }

});

// ======================
// FUNCTIONS
// ======================

function random(min, max) {
  return Math.floor(Math.random() * (max - min)) + min;
}

function rectsCollide(a, b) {

  return (
    a.x < b.x + b.w &&
    a.x + a.w > b.x &&
    a.y < b.y + b.h &&
    a.y + a.h > b.y
  );
}

function resetBlock(block, minX, maxX, y) {

  block.x = random(minX, maxX);
  block.y = y;
}

function resetLevel() {

  player.x = 350;

  score = 0;

  slippery = false;
  iceTimer = 0;

  normalDirection = 1;
  swingVelocity = 6;

  resetBlock(redBlock, 0, 740, -100);
  resetBlock(greenBlock, 0, 750, -300);
  resetBlock(orangeBlock, 0, 700, -200);
  resetBlock(purpleBlock, 0, 550, -500);
  resetBlock(iceBlock, 0, 740, -700);
}

// ======================
// UPDATE
// ======================

function update() {

  if (state !== "playing") return;

  const level = levels[currentLevel];

  // ====================
  // PLAYER MOVEMENT
  // ====================

  if (!slippery) {

    player.x += normalSpeed * normalDirection;

  } else {

    player.x += swingVelocity;

    if (swingVelocity > 0) {
      swingVelocity += 0.05;
    } else {
      swingVelocity -= 0.05;
    }
  }

  // WALLS

  if (player.x <= 0) {

    player.x = 0;

    if (slippery) {
      swingVelocity = Math.abs(swingVelocity);
    } else {
      normalDirection = 1;
    }
  }

  if (player.x + player.w >= WIDTH) {

    player.x = WIDTH - player.w;

    if (slippery) {
      swingVelocity = -Math.abs(swingVelocity);
    } else {
      normalDirection = -1;
    }
  }

  // ====================
  // ICE TIMER
  // ====================

  if (slippery) {

    iceTimer--;

    if (iceTimer <= 0) {

      slippery = false;

      if (swingVelocity > 0) {
        normalDirection = 1;
      } else {
        normalDirection = -1;
      }
    }
  }

  // ====================
  // MOVE BLOCKS
  // ====================

  redBlock.y += redBlock.speed;

  greenBlock.y += greenBlock.speed;

  if (level.orange) {

    orangeBlock.y += orangeBlock.speedY;
    orangeBlock.x += orangeBlock.speedX * orangeBlock.direction;

    if (orangeBlock.x <= 0) {
      orangeBlock.direction = 1;
    }

    if (orangeBlock.x + orangeBlock.w >= WIDTH) {
      orangeBlock.direction = -1;
    }
  }

  if (level.purple) {
    purpleBlock.y += purpleBlock.speed;
  }

  if (level.ice) {
    iceBlock.y += iceBlock.speed;
  }

  // ====================
  // RESET BLOCKS
  // ====================

  if (redBlock.y > HEIGHT) {
    resetBlock(redBlock, 0, 740, -100);
  }

  if (greenBlock.y > HEIGHT) {
    resetBlock(greenBlock, 0, 750, -300);
  }

  if (orangeBlock.y > HEIGHT) {
    resetBlock(orangeBlock, 0, 700, -200);
  }

  if (purpleBlock.y > HEIGHT) {
    resetBlock(purpleBlock, 0, 550, -500);
  }

  if (iceBlock.y > HEIGHT) {
    resetBlock(iceBlock, 0, 740, -700);
  }

  // ====================
  // COLLISIONS
  // ====================

  // GREEN

  if (rectsCollide(player, greenBlock)) {

    score++;

    resetBlock(greenBlock, 0, 750, -300);
  }

  // ICE

  if (level.ice && rectsCollide(player, iceBlock)) {

    score += 2;

    slippery = true;
    iceTimer = 300;

    if (normalDirection > 0) {
      swingVelocity = 6;
    } else {
      swingVelocity = -6;
    }

    resetBlock(iceBlock, 0, 740, -700);
  }

  // DEATH

  if (
    rectsCollide(player, redBlock) ||
    (level.orange && rectsCollide(player, orangeBlock)) ||
    (level.purple && rectsCollide(player, purpleBlock))
  ) {

    state = "dead";
  }

  // ====================
  // LEVEL COMPLETE
  // ====================

  if (score >= level.goal) {
    state = "level_complete";
  }

}

// ======================
// DRAW
// ======================

function draw() {

  ctx.clearRect(0, 0, WIDTH, HEIGHT);

  // ====================
  // MENU
  // ====================

  if (state === "menu") {

    ctx.fillStyle = "black";
    ctx.font = "60px Arial";

    ctx.fillText("BLOCK SURVIVAL", 150, 220);

    ctx.font = "35px Arial";

    ctx.fillText("Press SPACE to Play", 230, 320);
  }

  // ====================
  // PLAYING
  // ====================

  else if (state === "playing") {

    const level = levels[currentLevel];

    // PLAYER
    ctx.fillStyle = "blue";

    ctx.fillRect(
      player.x,
      player.y,
      player.w,
      player.h
    );

    // RED
    ctx.fillStyle = "red";

    ctx.fillRect(
      redBlock.x,
      redBlock.y,
      redBlock.w,
      redBlock.h
    );

    // GREEN
    ctx.fillStyle = "lime";

    ctx.fillRect(
      greenBlock.x,
      greenBlock.y,
      greenBlock.w,
      greenBlock.h
    );

    // ORANGE
    if (level.orange) {

      ctx.fillStyle = "orange";

      ctx.fillRect(
        orangeBlock.x,
        orangeBlock.y,
        orangeBlock.w,
        orangeBlock.h
      );
    }

    // PURPLE
    if (level.purple) {

      ctx.fillStyle = "purple";

      ctx.fillRect(
        purpleBlock.x,
        purpleBlock.y,
        purpleBlock.w,
        purpleBlock.h
      );
    }

    // ICE
    if (level.ice) {

      ctx.fillStyle = "cyan";

      ctx.fillRect(
        iceBlock.x,
        iceBlock.y,
        iceBlock.w,
        iceBlock.h
      );
    }

    // UI
    ctx.fillStyle = "black";
    ctx.font = "30px Arial";

    ctx.fillText("Score: " + score, 20, 40);

    ctx.fillText(
      "Goal: " + level.goal,
      20,
      80
    );

    ctx.fillText(
      "Level: " + currentLevel,
      20,
      120
    );

    if (slippery) {

      ctx.fillStyle = "cyan";

      ctx.fillText(
        "SWINGCOPTER MODE!",
        20,
        160
      );
    }
  }

  // ====================
  // DEAD
  // ====================

  else if (state === "dead") {

    ctx.fillStyle = "red";
    ctx.font = "60px Arial";

    ctx.fillText("YOU DIED", 220, 240);

    ctx.fillStyle = "black";
    ctx.font = "35px Arial";

    ctx.fillText(
      "Press R to Restart",
      240,
      330
    );
  }

  // ====================
  // LEVEL COMPLETE
  // ====================

  else if (state === "level_complete") {

    ctx.fillStyle = "green";
    ctx.font = "60px Arial";

    ctx.fillText(
      "LEVEL COMPLETE!",
      120,
      240
    );

    ctx.fillStyle = "black";
    ctx.font = "35px Arial";

    ctx.fillText(
      "Press SPACE",
      280,
      330
    );
  }

}

// ======================
// GAME LOOP
// ======================

function gameLoop() {

  update();
  draw();

  requestAnimationFrame(gameLoop);
}

gameLoop();

</script>

</body>
</html>
